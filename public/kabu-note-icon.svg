<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0a1f12"/>

  <!-- Turnip body (white/cream) -->
  <ellipse cx="50" cy="69" rx="27" ry="22" fill="#f5f0ea"/>
  <!-- Purple tint at top of turnip -->
  <ellipse cx="50" cy="53" rx="21" ry="13" fill="#c084fc" opacity="0.35"/>

  <!-- Root lines -->
  <line x1="44" y1="88" x2="41" y2="95" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="90" x2="50" y2="97" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="88" x2="59" y2="95" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>

  <!-- Stem -->
  <line x1="50" y1="47" x2="50" y2="37" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M49 42 C42 37 36 32 32 21 C41 25 47 34 49 42" fill="#4ade80"/>
  <!-- Right leaf -->
  <path d="M51 42 C58 37 64 32 68 21 C59 25 53 34 51 42" fill="#22c55e"/>
  <!-- Center leaf -->
  <path d="M50 40 C47 30 48 23 50 18 C52 23 53 30 50 40" fill="#16a34a"/>

  <!-- Chart line across turnip -->
  <polyline points="27,77 37,65 46,70 55,57 64,61 74,49"
    stroke="#10b981" stroke-width="3.2" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead -->
  <polyline points="69,46 74,49 71,54"
    stroke="#10b981" stroke-width="3.2" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
